global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: 'spring-boot-achat'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['devops-app:8080']
        labels:
          application: 'achat-app'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
